<!-- @dsCard group="Components" name="Best slot · in bloom" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pollendar</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        canvas: '#14122B', surface: '#211E40', surface2: '#2B2752',
        line: '#36325E', pollen: '#FFC857', pollenDeep: '#F0A93B',
        moonlight: '#F4F2FF', dim: '#B8B3DE', mute: '#7E79AE',
        yes: '#FFC857', maybe: '#B8B3DE', no: '#3A3563',
        mint: '#6FE0B0', coral: '#FF7A6B',
      },
      fontFamily: {
        display: ['"Space Grotesk"', 'ui-sans-serif', 'sans-serif'],
        sans: ['Inter', 'ui-sans-serif', 'sans-serif'],
      },
      borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
      boxShadow: {
        glow: '0 0 0 1px rgba(255,200,87,.55), 0 0 28px rgba(255,200,87,.32)',
        card: '0 10px 30px -12px rgba(0,0,0,.55)',
      },
    },
  },
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: dark; }
  html, body { background-color: #14122B; }
  body { font-family: 'Inter', ui-sans-serif, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Space Grotesk', ui-sans-serif, sans-serif; }
  .bg-dusk {
    background-color: #14122B;
    background-image:
      radial-gradient(900px 520px at 85% -12%, rgba(255,200,87,.10), transparent 60%),
      radial-gradient(720px 460px at -5% 110%, rgba(124,138,224,.12), transparent 60%);
  }
  .pollen-dot { background: radial-gradient(circle at 35% 30%, #FFE6A8, #FFC857 58%, #E0A325); border-radius: 9999px; box-shadow: 0 0 8px rgba(255,200,87,.55); }
  .bloom { box-shadow: 0 0 0 1px rgba(255,200,87,.55), 0 0 30px rgba(255,200,87,.30); }
  .bloom-bg { background-image: radial-gradient(130% 120% at 50% 0%, rgba(255,200,87,.16), rgba(255,200,87,0) 70%); }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #36325E; border-radius: 9999px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="bg-dusk text-moonlight min-h-screen">
<main class="mx-auto grid min-h-screen max-w-5xl place-items-center p-10 sm:p-16">
  <div class="w-full max-w-2xl space-y-10">

    <!-- Variant 1: Large bloom card -->
    <div class="space-y-3">
      <p class="text-xs uppercase tracking-widest text-mute">Best slot · large bloom card</p>
      <section class="bloom bloom-bg relative overflow-hidden rounded-2xl border border-pollen/40 bg-surface p-6 shadow-glow">
        <!-- decorative pollen grains -->
        <span class="pollen-dot absolute right-6 top-5 h-2 w-2 opacity-90"></span>
        <span class="pollen-dot absolute right-12 top-10 h-1.5 w-1.5 opacity-70"></span>
        <span class="pollen-dot absolute right-20 top-6 h-1 w-1 opacity-50"></span>
        <span class="pollen-dot absolute bottom-6 left-7 h-1.5 w-1.5 opacity-60"></span>

        <div class="flex items-start justify-between gap-4">
          <div class="space-y-1">
            <span class="inline-flex items-center gap-1.5 rounded-full bg-pollen/15 px-3 py-1 text-sm font-medium text-pollen ring-1 ring-pollen/40">✦ In bloom</span>
            <p class="pt-2 text-xs uppercase tracking-widest text-mute">Team dinner · best time</p>
          </div>
          <div class="text-right">
            <div class="font-display text-5xl font-bold leading-none text-pollen">10</div>
            <p class="pt-1 text-xs uppercase tracking-widest text-mute">Score</p>
          </div>
        </div>

        <div class="mt-5">
          <h3 class="font-display text-2xl font-semibold tracking-tight text-moonlight">Thursday, Jun 26</h3>
          <p class="mt-1 font-display text-base font-medium text-dim">18:00 – 20:00 · Early</p>
        </div>

        <div class="mt-5 flex items-center gap-3 border-t border-line/70 pt-4">
          <div class="flex -space-x-1.5">
            <span class="pollen-dot h-3.5 w-3.5 ring-2 ring-surface"></span>
            <span class="pollen-dot h-3.5 w-3.5 ring-2 ring-surface"></span>
            <span class="pollen-dot h-3.5 w-3.5 ring-2 ring-surface"></span>
            <span class="pollen-dot h-3.5 w-3.5 ring-2 ring-surface"></span>
            <span class="pollen-dot h-3.5 w-3.5 ring-2 ring-surface"></span>
          </div>
          <p class="font-display text-sm font-medium text-moonlight">5 of 5 available</p>
          <span class="ml-auto text-sm text-mute">Europe/Brussels</span>
        </div>
      </section>
    </div>

    <!-- Variant 2: Compact inline badge -->
    <div class="space-y-3">
      <p class="text-xs uppercase tracking-widest text-mute">Compact inline badge · for lists</p>
      <section class="rounded-2xl border border-line bg-surface p-6 shadow-card">
        <div class="flex flex-wrap items-center gap-2.5">
          <span class="inline-flex items-center gap-1.5 rounded-full bg-pollen/15 px-3 py-1 text-sm font-medium text-pollen ring-1 ring-pollen/40">✦ In bloom</span>
          <span class="inline-flex items-center gap-2 rounded-full border border-pollen/30 bg-pollen/10 px-3 py-1 text-sm font-medium text-moonlight">
            <span class="pollen-dot h-2 w-2"></span>
            Best: <span class="font-display font-semibold text-pollen">Thu 26 · Early</span>
          </span>
        </div>

        <!-- shown in context of a list row -->
        <div class="mt-5 flex items-center gap-3 rounded-xl border border-line bg-canvas px-4 py-3">
          <span class="grid h-9 w-9 place-items-center rounded-xl bg-surface2 font-display text-sm font-semibold text-dim ring-1 ring-line">TD</span>
          <div class="min-w-0">
            <p class="truncate font-display text-sm font-semibold text-moonlight">Team dinner</p>
            <p class="truncate text-xs text-mute">5 responses · gathering responses</p>
          </div>
          <span class="ml-auto inline-flex items-center gap-1.5 rounded-full bg-pollen/15 px-2.5 py-1 text-xs font-medium text-pollen ring-1 ring-pollen/40">✦ Thu 26 · Early</span>
        </div>
      </section>
    </div>

  </div>
</main>
</body>
</html>
