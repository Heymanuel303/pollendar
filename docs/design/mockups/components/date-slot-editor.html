<!-- @dsCard group="Components" name="Date & slot editor" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pollendar</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        canvas: '#14122B', surface: '#211E40', surface2: '#2B2752',
        line: '#36325E', pollen: '#FFC857', pollenDeep: '#F0A93B',
        moonlight: '#F4F2FF', dim: '#B8B3DE', mute: '#7E79AE',
        yes: '#FFC857', maybe: '#B8B3DE', no: '#3A3563',
        mint: '#6FE0B0', coral: '#FF7A6B',
      },
      fontFamily: {
        display: ['"Space Grotesk"', 'ui-sans-serif', 'sans-serif'],
        sans: ['Inter', 'ui-sans-serif', 'sans-serif'],
      },
      borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
      boxShadow: {
        glow: '0 0 0 1px rgba(255,200,87,.55), 0 0 28px rgba(255,200,87,.32)',
        card: '0 10px 30px -12px rgba(0,0,0,.55)',
      },
    },
  },
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: dark; }
  html, body { background-color: #14122B; }
  body { font-family: 'Inter', ui-sans-serif, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Space Grotesk', ui-sans-serif, sans-serif; }
  .bg-dusk {
    background-color: #14122B;
    background-image:
      radial-gradient(900px 520px at 85% -12%, rgba(255,200,87,.10), transparent 60%),
      radial-gradient(720px 460px at -5% 110%, rgba(124,138,224,.12), transparent 60%);
  }
  .pollen-dot { background: radial-gradient(circle at 35% 30%, #FFE6A8, #FFC857 58%, #E0A325); border-radius: 9999px; box-shadow: 0 0 8px rgba(255,200,87,.55); }
  .bloom { box-shadow: 0 0 0 1px rgba(255,200,87,.55), 0 0 30px rgba(255,200,87,.30); }
  .bloom-bg { background-image: radial-gradient(130% 120% at 50% 0%, rgba(255,200,87,.16), rgba(255,200,87,0) 70%); }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #36325E; border-radius: 9999px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="bg-dusk text-moonlight min-h-screen">
<main class="mx-auto grid min-h-screen max-w-5xl place-items-center p-10 sm:p-16">
  <div class="w-full max-w-2xl">
    <p class="mb-4 text-xs uppercase tracking-widest text-mute">Components · Date &amp; slot editor</p>

    <section class="rounded-2xl border border-line bg-surface p-6 shadow-card">
      <div class="mb-5 flex items-start justify-between gap-4">
        <div>
          <h2 class="font-display text-xl font-semibold tracking-tight">When works for everyone?</h2>
          <p class="mt-1 text-sm text-dim">Add the dates and times you're considering for <span class="text-moonlight">Team dinner</span>.</p>
        </div>
        <span class="hidden shrink-0 rounded-full bg-surface2 px-3 py-1 font-display text-sm text-dim ring-1 ring-line sm:inline-block">4 slots</span>
      </div>

      <div class="space-y-4">

        <!-- Thu Jun 26 — winning date, blooms -->
        <div class="bloom-bg shadow-glow rounded-xl border border-pollen/40 bg-surface2/60 p-4">
          <div class="flex items-center gap-3">
            <button class="cursor-grab text-mute transition hover:text-dim" aria-label="Drag to reorder" title="Drag to reorder">⠿</button>
            <div class="flex flex-1 items-center gap-2.5">
              <h3 class="font-display text-base font-semibold">Thu, Jun 26</h3>
              <span class="inline-flex items-center gap-1.5 rounded-full bg-pollen/15 px-3 py-1 text-sm font-medium text-pollen ring-1 ring-pollen/40">✦ In bloom</span>
            </div>
            <button class="grid h-8 w-8 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove date" title="Remove date">✕</button>
          </div>

          <div class="mt-4 space-y-2.5">
            <!-- Early slot -->
            <div class="rounded-lg border border-line bg-canvas/70 p-3">
              <div class="flex flex-wrap items-center gap-3">
                <input value="Early" aria-label="Slot label" class="w-28 rounded-lg border border-line bg-canvas px-3 py-2 text-sm text-moonlight placeholder:text-mute focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                <div class="flex items-center gap-2">
                  <input value="18:00" aria-label="Start time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                  <span class="text-mute">–</span>
                  <input value="20:00" aria-label="End time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                </div>
                <div class="ml-auto flex items-center gap-3">
                  <span class="flex items-center gap-1 font-display text-sm text-pollen" title="5 yeses">
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="ml-1">5</span>
                  </span>
                  <button class="grid h-7 w-7 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove slot" title="Remove slot">✕</button>
                </div>
              </div>
            </div>
            <!-- Late slot -->
            <div class="rounded-lg border border-line bg-canvas/70 p-3">
              <div class="flex flex-wrap items-center gap-3">
                <input value="Late" aria-label="Slot label" class="w-28 rounded-lg border border-line bg-canvas px-3 py-2 text-sm text-moonlight placeholder:text-mute focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                <div class="flex items-center gap-2">
                  <input value="20:00" aria-label="Start time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                  <span class="text-mute">–</span>
                  <input value="22:00" aria-label="End time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                </div>
                <div class="ml-auto flex items-center gap-3">
                  <span class="flex items-center gap-1 font-display text-sm text-dim" title="3 yeses">
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="ml-1">3</span>
                  </span>
                  <button class="grid h-7 w-7 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove slot" title="Remove slot">✕</button>
                </div>
              </div>
            </div>
          </div>

          <button class="mt-3 inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-dim transition hover:text-moonlight">＋ Add time slot</button>
        </div>

        <!-- Fri Jun 27 — All day -->
        <div class="rounded-xl border border-line bg-surface2/40 p-4">
          <div class="flex items-center gap-3">
            <button class="cursor-grab text-mute transition hover:text-dim" aria-label="Drag to reorder" title="Drag to reorder">⠿</button>
            <h3 class="flex-1 font-display text-base font-semibold">Fri, Jun 27</h3>
            <button class="grid h-8 w-8 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove date" title="Remove date">✕</button>
          </div>

          <div class="mt-4 space-y-2.5">
            <div class="rounded-lg border border-line bg-canvas/70 p-3">
              <div class="flex flex-wrap items-center gap-3">
                <input value="All day" aria-label="Slot label" class="w-28 rounded-lg border border-line bg-canvas px-3 py-2 text-sm text-moonlight placeholder:text-mute focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                <div class="inline-flex rounded-xl border border-line bg-canvas p-1 text-sm font-medium">
                  <button class="rounded-lg bg-yes px-3 py-1.5 text-canvas shadow-glow">All day</button>
                  <button class="rounded-lg px-3 py-1.5 text-dim transition hover:text-moonlight">Set times</button>
                </div>
                <div class="ml-auto flex items-center gap-3">
                  <span class="flex items-center gap-1 font-display text-sm text-dim" title="2 yeses">
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="ml-1">2</span>
                  </span>
                  <button class="grid h-7 w-7 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove slot" title="Remove slot">✕</button>
                </div>
              </div>
            </div>
          </div>

          <button class="mt-3 inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-dim transition hover:text-moonlight">＋ Add time slot</button>
        </div>

        <!-- Sat Jun 28 — Evening -->
        <div class="rounded-xl border border-line bg-surface2/40 p-4">
          <div class="flex items-center gap-3">
            <button class="cursor-grab text-mute transition hover:text-dim" aria-label="Drag to reorder" title="Drag to reorder">⠿</button>
            <h3 class="flex-1 font-display text-base font-semibold">Sat, Jun 28</h3>
            <button class="grid h-8 w-8 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove date" title="Remove date">✕</button>
          </div>

          <div class="mt-4 space-y-2.5">
            <div class="rounded-lg border border-line bg-canvas/70 p-3">
              <div class="flex flex-wrap items-center gap-3">
                <input value="Evening" aria-label="Slot label" class="w-28 rounded-lg border border-line bg-canvas px-3 py-2 text-sm text-moonlight placeholder:text-mute focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                <div class="flex items-center gap-2">
                  <input value="19:00" aria-label="Start time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                  <span class="text-mute">–</span>
                  <input value="22:00" aria-label="End time" class="w-20 rounded-lg border border-line bg-canvas px-3 py-2 text-center font-display text-sm text-moonlight focus:border-pollen focus:outline-none focus:ring-2 focus:ring-pollen/30" />
                </div>
                <div class="ml-auto flex items-center gap-3">
                  <span class="flex items-center gap-1 font-display text-sm text-dim" title="1 yes">
                    <span class="pollen-dot inline-block h-2.5 w-2.5"></span>
                    <span class="ml-1">1</span>
                  </span>
                  <button class="grid h-7 w-7 place-items-center rounded-lg text-mute transition hover:bg-surface hover:text-coral" aria-label="Remove slot" title="Remove slot">✕</button>
                </div>
              </div>
            </div>
          </div>

          <button class="mt-3 inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-dim transition hover:text-moonlight">＋ Add time slot</button>
        </div>

      </div>

      <!-- Prominent add-a-date action -->
      <button class="mt-5 flex w-full items-center justify-center gap-2 rounded-xl border border-dashed border-line bg-canvas/40 px-4 py-3.5 font-medium text-dim transition hover:border-pollen/50 hover:bg-surface2 hover:text-moonlight">
        <span class="text-lg leading-none text-pollen">＋</span> Add a date
      </button>

      <div class="mt-6 flex items-center justify-between border-t border-line/70 pt-5">
        <p class="text-sm text-mute">All times in <span class="text-dim">Europe/Brussels</span>. Takes about a minute.</p>
        <button class="inline-flex items-center justify-center gap-2 rounded-xl bg-pollen px-4 py-2.5 font-medium text-canvas shadow-glow transition hover:brightness-110 active:translate-y-px">Save dates</button>
      </div>
    </section>
  </div>
</main>
</body>
</html>
