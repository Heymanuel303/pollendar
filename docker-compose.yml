# PostgreSQL + Mailpit for LOCAL DEV and the e2e suite ONLY.
#   docker compose up -d
# PostgreSQL → localhost:5432
# Mailpit → SMTP localhost:1025, web UI http://localhost:8025 (dev/e2e email sink)
#
# Mailpit is the dev/e2e SMTP sink — it is NOT a production service. In production
# the same SMTP_* env vars point at Resend (smtp.resend.com); there is no compose
# service for prod email. See docs/DEPLOY.md ("Resend setup") for the env-driven
# prod=Resend / dev=Mailpit split (same MailService, no code change).
services:
  postgres:
    image: postgres:16
    container_name: pollendar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pollendar}
      POSTGRES_USER: ${POSTGRES_USER:-pollendar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pollendar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pollendar} -d ${POSTGRES_DB:-pollendar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: pollendar-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
